name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master", "dev", "develop" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Run Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js v24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Run Smoke Verification Tests
        run: npm test

  docker-build-push:
    name: Build & Publish Docker Image
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase Repository Name for Docker
        run: |
          echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}:latest
            ghcr.io/${{ env.REPO_LOWER }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Ubuntu Server
    needs: docker-build-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Install Cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Setup SSH Directory & Key
        run: |
          mkdir -p ~/.ssh
          cat << '_SSH_KEY_EOF_' | tr -d '\r' > ~/.ssh/id_rsa
          ${{ secrets.SSH_PRIVATE_KEY }}
          _SSH_KEY_EOF_
          chmod 600 ~/.ssh/id_rsa
          
          # Diagnostic info (Safe - does not expose secret)
          echo "=== SSH Key Diagnostics ==="
          echo "File size: \$(wc -c < ~/.ssh/id_rsa) bytes"
          echo "Line count: \$(wc -l < ~/.ssh/id_rsa)"
          echo -n "Header check: "
          head -n 1 ~/.ssh/id_rsa | cut -c 1-20
          echo -n "Footer check: "
          tail -n 1 ~/.ssh/id_rsa | cut -c 1-20
          echo "==========================="
          
          ssh-keygen -l -f ~/.ssh/id_rsa

      - name: Configure SSH for Cloudflare Tunnel
        run: |
          cat <<EOF > ~/.ssh/config
          Host ssh.mahendhraa.com
            ProxyCommand cloudflared access ssh --hostname %h
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          EOF

      - name: Run Deploy Command over Cloudflare Tunnel
        run: |
          ssh -i ~/.ssh/id_rsa manivannang@ssh.mahendhraa.com "cd ~/astroreha_port_1300 || cd /home/manivannang/astroreha_port_1300 || cd /root/astroreha_port_1300 && git pull origin main && chmod +x docker_start.sh && ./docker_start.sh"
